<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/main.css">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
  </head>
  <body class="bg-gray-400">
    <form action="/users" method="POST">
       <div class="mx-auto w-3/5  p-2 mt-2 bg-white to-blue-400">
        <h1 class="text-2xl text-center">Registration Form</h1>
      <div class=" ">
        <label  for="firstName">First name : </label>
        <input type="text" id="firstName" name="firstName">
      </div>
      <div>
        <label for="lastName">Last name : </label>
        <input type="text" id="lastName" name="lastName">
      </div>
      <div>
        <label for="fatherName">Father name : </label>
        <input type="text" id="fatherName" name="fatherName">
      </div>
      <div>
        <label for="motherName">Mother name : </label>
        <input type="text" id="motherName" name="motherName">
      </div>
      <div>
        <label for="age">Age : </label>
        <input type="number" id="age" name="age" min="5" max="8">
      </div>
      <div>
        <label for="dof">Date of birth : </label>
        <input type="date" id="dof" name="dof">
      </div>
      <div>
        <Label for="divition">Division :</Label>
        <select name="divition" id="divition"> 
          <option value="dhaka">Dhaka</option>
          <option value="mymensingh" selected>mymensingh</option>
          <option value="khulna">khulna</option>
          <option value="chattrogram">chattrogram</option>
        </select>
      </div>
      <div>
        <h1>Gender:</h1>
        <label for="male">Male: </label>
        <input type="radio" name="gender" id="male" value="male">
        <label for="female">Female: </label>
        <input type="radio" name="gender" id="female" value="female">
        <label for="other">Other: </label>
        <input type="radio" name="gender" id="other" value="other">
      </div>
      <input type="reset" value="reset">
      <input type="submit" value="submit">
     </div></form>

  </body>
</html>
